<html lang="en">

</head>
<body>

<div class="brand-section">
    <h1>UMT Portal</h1>
    <p>Quantum-Secure Authentication Module (QSAM)</p>
</div>

<div class="login-section">
<div class="login-card">
<h2>Student Login</h2>
<button class="mic-btn" id="micBtn" onclick="startListening()">🎤 Enable Voice (Spacebar)</button>

<div class="cam-wrapper" id="camBox">
<video id="video" autoplay muted playsinline></video>
<canvas id="canvas" style="display:none;"></canvas>
</div>

<div id="status" style="color: #dc3545; font-weight: bold; font-size: 0.9rem;">⚠️ Face Verification Required</div>

<div id="quantumBar"><div id="quantumFill"></div></div>
<small id="keyText" style="display:none; color: var(--primary);">Generating Quantum Key...</small>

<input type="text" id="user" placeholder="NetID / Username" disabled>
<input type="password" id="pass" placeholder="Password" disabled>
<button id="btn" disabled>SECURE LOGIN</button>
</div>
</div>

<script>
const video = document.getElementById('video');
const canvas = document.getElementById('canvas');
const ctx = canvas.getContext('2d');
const status = document.getElementById('status');
const camBox = document.getElementById('camBox');
let isSecure = false;

window.onload = function() {
    document.getElementById('micBtn').focus();
    window.speechSynthesis.speak(new SpeechSynthesisUtterance("Welcome. Press Spacebar to speak."));
};

document.body.onkeyup = e => { if(e.keyCode == 32) startListening(); }

navigator.mediaDevices.getUserMedia({ video: true }).then(s => {
    video.srcObject = s;
    setInterval(detectFace, 1000);
});

function detectFace() {
    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    fetch('/detect_face', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({image: canvas.toDataURL('image/jpeg')})
    }).then(res=>res.json()).then(data => {
        if(data.face_detected) {
            if(!isSecure) {
                isSecure = true;
                camBox.classList.add('verified');
                status.innerText = "✅ Biometric Verified";
                status.style.color = "#28a745";
                triggerQuantum();
            }
        } else {
            if(isSecure) {
                isSecure = false;
                camBox.classList.remove('verified');
                camBox.classList.add('locked');
                status.innerText = "⚠️ Face Lost! System Locked.";
                toggleInputs(true);
            }
        }
    });
}

function triggerQuantum() {
    if(!isSecure) return;
    document.getElementById('quantumBar').style.display = 'block';

    fetch('/get_quantum_key').then(res=>res.json()).then(data => {
        setTimeout(() => document.getElementById('quantumFill').style.width = "100%", 100);

        setTimeout(() => {
            if(isSecure) {
                document.getElementById('keyText').style.display = 'block';
                document.getElementById('keyText').innerText =
                    `Quantum Encrypted: ${data.key.substring(0,10)}...`;
                toggleInputs(false);
                speak("Face Verified.");
            }
        }, 1000);
    });
}

function toggleInputs(disabled) {
    document.getElementById('user').disabled = disabled;
    document.getElementById('pass').disabled = disabled;
    document.getElementById('btn').disabled = disabled;
}

document.getElementById('btn').onclick = function() {
    const u = document.getElementById('user').value;
    const p = document.getElementById('pass').value;

    canvas.width = video.videoWidth;
    canvas.height = video.videoHeight;
    ctx.drawImage(video, 0, 0);

    fetch('/login', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({
            username: u,
            password: p,
            image: canvas.toDataURL('image/jpeg')
        })
    })
    .then(res=>res.json())
    .then(data => {

        if(data.success) {

            // ✅ QUANTUM VERIFICATION STEP
            const quantum_key = data.quantum_key;

            fetch('/quantum_verify', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({key: quantum_key})
            })
            .then(res=>res.json())
            .then(qdata => {
                if(qdata.success) {
                    speak("Access Granted.");
                    setTimeout(() => window.location.href="/dashboard", 1500);
                } else {
                    alert("Quantum verification failed!");
                }
            });

        } else {
            alert(data.message);
            speak("Login failed.");
        }

    });
};

function startListening() {
    if (!('webkitSpeechRecognition' in window)) return;
    const rec = new webkitSpeechRecognition();
    rec.lang = 'en-US';
    rec.start();

    document.getElementById('micBtn').classList.add('mic-active');

    rec.onresult = function(e) {
        let txt = e.results[0][0].transcript.replace(/[.,\s]/g, '');

        if (e.results[0][0].transcript.toLowerCase().includes("login")) {
            document.getElementById('btn').click();
        } else if (!document.getElementById('user').value) {
            document.getElementById('user').value = txt;
        } else {
            document.getElementById('pass').value = txt;
        }

        document.getElementById('micBtn').classList.remove('mic-active');
    };
}

function speak(t) {
    window.speechSynthesis.speak(new SpeechSynthesisUtterance(t));
}
</script>

</body>
</html>
